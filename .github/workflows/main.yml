name: TG Monitor

on:
  schedule:
    # 每 5 小时运行一次
    - cron: '0 */5 * * *'
  workflow_dispatch:

# 👇 就是这三行救命代码！它保证全局永远只有一个机器人在跑
concurrency:
  group: tg-monitor
  cancel-in-progress: true 

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon

      - name: Run Telegram Monitor
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        # 因为有了并发锁，我们把超时放宽到 5.5 小时 (19800s)
        run: timeout 19800s python monitor.py || exit 0
